<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusCart — KsTU Marketplace</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>🛒 CampusCart</h1>
      <p>Buy, sell, and trade with fellow KsTU students</p>
    </div>
  </header>

  <main class="container">
    <section class="post-listing">
      <h2>Post a Listing</h2>
      <form id="listing-form">
        <div class="form-row">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="e.g. Engineering Mathematics Textbook" required />
        </div>

        <div class="form-row">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Condition details, edition, etc."></textarea>
        </div>

        <div class="form-row form-row-split">
          <div>
            <label for="price">Price (GHS)</label>
            <input type="number" id="price" name="price" min="1" step="0.01" required />
          </div>
          <div>
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="books">Books</option>
              <option value="electronics">Electronics</option>
              <option value="furniture">Furniture</option>
              <option value="clothing">Clothing</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row form-row-split">
          <div>
            <label for="item_condition">Condition</label>
            <select id="item_condition" name="item_condition">
              <option value="new">New</option>
              <option value="like_new">Like New</option>
              <option value="used">Used</option>
              <option value="fair">Fair</option>
            </select>
          </div>
          <div>
            <label for="seller_contact">Contact (WhatsApp/Phone)</label>
            <input type="text" id="seller_contact" name="seller_contact" placeholder="024xxxxxxx" required />
          </div>
        </div>

        <div class="form-row">
          <label for="seller_name">Your Name</label>
          <input type="text" id="seller_name" name="seller_name" placeholder="e.g. Ama Serwaa" required />
        </div>

        <button type="submit">Post Listing</button>
        <p id="form-message" class="form-message"></p>
      </form>
    </section>

    <section class="browse-listings">
      <div class="browse-header">
        <h2>Browse Listings</h2>
        <select id="category-filter">
          <option value="">All Categories</option>
          <option value="books">Books</option>
          <option value="electronics">Electronics</option>
          <option value="furniture">Furniture</option>
          <option value="clothing">Clothing</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div id="listings-grid" class="listings-grid">
        <p class="loading">Loading listings...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>CampusCart &middot; Built by Harruna Abdul Kudus &middot; Codveda Full-Stack Internship, Level 1</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
